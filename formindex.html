<!DOCTYPE html>

<html lang = "en">
    <head>
        <meta charset="utf-8">
        <meta name="page description" content="This is a page about a pizza order">
        <meta name="keywords"  content="pizza, page, order">
        <link rel="stylesheet" href="form.css">
        <title>Pizza Order Form</title>
    </head>

    <body>
        <form id="pizza_form" action="my_app.php" method="post">
            <p>Pizza order form</p>
            <p>Name: <input type="text" name="Name" id="Name"></p>
            <p>Address: <input type="text" name="address" id="address"></p>
            <p>Phone Number: <input type="text" name="number" id="number"></p>
            <p>Size</p>
            <input type="checkbox" name="small" id="small" checked>
            <label for="small">Small</label>
            <input type="checkbox" name="medium" id="medium">
            <label for="medium">Medium</label>
            <input type="checkbox" name="large" id="large">
            <label for="large">Large</label><br><br>
            <p>Toppings</p>
            <input type="checkbox" name="cheese" id="cheese">
            <label for="cheese">Cheese</label>
            <input type="checkbox" name="pepperoni" id="pepperoni">
            <label for="pepperoni">Pepperoni</label>
            <input type="checkbox" name="green peppers" id="green peppers">
            <label for="green peppers">Green Peppers</label>
            <input type="checkbox" name="mushroom" id="mushroom">
            <label for="mushroom">Mushrooms</label>
            <input type="checkbox" name="chicken" id="chicken">
            <label for="chicken">Chicken</label>
            <br><br>
            <textarea name="comments" id="comment" cols="30" rows="10" placeholder="Notes to the Chef"></textarea>
            <p><input type="submit" type="submit" value="submit"></p>
        </form>
    </body>

</html>
